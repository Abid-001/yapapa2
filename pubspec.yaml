name: yapapa
description: A social accountability app for friends.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.5
  firebase_database: ^10.5.7
  firebase_messaging: ^14.9.4

  # Local notifications
  flutter_local_notifications: ^17.2.4

  # Session storage
  shared_preferences: ^2.3.3

  # Screentime (Android UsageStats)
  app_usage: ^3.0.1

  # Date/time formatting
  intl: ^0.19.0

  # State management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  fl_chart: ^0.67.0

  # Phone call + connectivity
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.1

  # Link preview + share intent
  http: ^1.2.1
  receive_sharing_intent: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
