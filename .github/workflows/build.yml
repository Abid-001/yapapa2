name: Build Yapapa APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Verify Flutter install
        run: |
          flutter --version
          dart --version

      - name: Write local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          cat android/local.properties

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Create assets directory
        run: mkdir -p assets/images

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (catch Dart errors before build)
        run: flutter analyze --no-fatal-infos 2>&1 | tee analyze_log.txt || true

      - name: Build APK (release)
        shell: bash
        run: |
          touch build_log.txt
          set -o pipefail
          flutter build apk --release --verbose 2>&1 | tee build_log.txt

      - name: Show analyze log on failure
        if: failure()
        run: |
          echo "=== ANALYZE LOG ==="
          cat analyze_log.txt || echo "(no analyze log)"

      - name: Show last 150 lines of build log on failure
        if: failure()
        run: |
          echo "=== BUILD LOG (last 150 lines) ==="
          tail -150 build_log.txt || echo "(build_log.txt is empty or missing)"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_log.txt
            analyze_log.txt

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: yapapa-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
